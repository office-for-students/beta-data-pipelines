# DevOps Pipeline definition for the OFS Beta Backend Data Pipeline

#Disable CI
trigger: none

#Disable PR
pr: none

# Build Agent Resources
pool:
  vmImage: 'windows-latest'
strategy:
  matrix:
    Python39:
      python.version: '3.11'

# Build Process Tree
steps:

# Enforce Python Version (see above)
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
  displayName: 'Use Python $(python.version)'


- task: PythonScript@0
  displayName: 'Download and Prepare HESA data'
  inputs:
    scriptSource: 'inline'
    script: |
      """Download the latest archive from HESA with retry logic"""
      import urllib.request
      import zipfile
      import gzip
      import os
      import time
      import fnmatch

      def download_file(url, dest):
          hdr = {
              'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.11 (KHTML, like Gecko) Chrome/23.0.1271.64 Safari/537.11',
              'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
              'Connection': 'keep-alive'
          }
          max_retries = 3
          retry_delay = 10
          for attempt in range(max_retries):
              try:
                  print(f'Attempting to fetch file from {url}... Attempt #{attempt + 1}')
                  req = urllib.request.Request(url, headers=hdr)
                  with urllib.request.urlopen(req) as response:
                      print('Beginning file download...')
                      with open(dest, 'wb') as out_file:
                          while True:
                              data = response.read(1024 * 1024)  # 1MB chunks
                              if not data:
                                  break
                              out_file.write(data)
                  print('Download complete!')
                  return True
              except Exception as e:
                  print(f'Error during download: {e}')
                  if attempt < max_retries - 1:
                      print(f'Retrying in {retry_delay} seconds...')
                      time.sleep(retry_delay)
                  else:
                      raise

      url = r'$(HesaURL)'
      output_dir = r'$(Agent.TempDirectory)'
      zip_path = os.path.join(output_dir, 'hesa_data.zip')
      gz_path = os.path.join(output_dir, 'latest.xml.gz')

      # 1. Download
      try:
          download_file(url, zip_path)
      except Exception as e:
          print(f"Failed to download file: {e}")
          exit(1)

      # 2. Process ZIP
      print('Searching for kis*.xml in ZIP...')
      try:
          with zipfile.ZipFile(zip_path, 'r') as z:
              kis_file_info = None
              
              # Primary search pattern
              for info in z.infolist():
                  if fnmatch.fnmatch(info.filename, '*/on_*/kis*.xml') or \
                     fnmatch.fnmatch(info.filename, 'on_*/kis*.xml') or \
                     fnmatch.fnmatch(info.filename, 'kis*.xml'):
                      print(f'Found matching file in ZIP: {info.filename}')
                      kis_file_info = info
                      break
              
              # Fallback: search anywhere for kis*.xml
              if not kis_file_info:
                  for info in z.infolist():
                      if fnmatch.fnmatch(os.path.basename(info.filename), 'kis*.xml'):
                          print(f'Found matching file (fallback): {info.filename}')
                          kis_file_info = info
                          break

- task: PythonScript@0
  displayName: 'Find latest kis.xml'
  inputs:
    scriptSource: 'inline'
    script: |
      """Find the latest kis.xml from the HESA archive"""
      import glob
      import shutil

      print('Looking for file...')

      kis_file = None
      for file in glob.glob(r'$(Agent.TempDirectory)\latest_hesa_data\on_*'):
          for found_file in glob.glob(file + '\\kis*.xml'):
              print('Found matching file: ' + found_file)
              kis_file = found_file

      if not kis_file:
          for file in glob.glob(r'$(Agent.TempDirectory)\latest_hesa_data\DiscoverUni_*'):
              for found_file in glob.glob(file + '\\kis*.xml'):
                  print('Found matching file: ' + found_file)
                  kis_file = found_file

      if kis_file:
          print('Moving matching file...')
          shutil.copy(kis_file, r'$(Agent.TempDirectory)\latest.xml')
          print('Found latest file!')
      else:
          print('No matching file found!')
          exit(1)

- task: PythonScript@0
  displayName: 'Archive latest kis xml file'
  inputs:
    scriptSource: 'inline'
    script: |
      """Archive the latest HESA kis xml file"""
      import gzip
      import shutil

      print('Archiving file...')

      with open(r'$(Agent.TempDirectory)\latest.xml', 'rb') as f_in:
          with gzip.open(r'$(Agent.TempDirectory)\latest.xml.gz', 'wb') as f_out:
              shutil.copyfileobj(f_in, f_out)

      print('Archive complete!')


- task: AzureFileCopy@6
  displayName: 'Copy kis archive to storage blob'
  inputs:
    SourcePath: '$(Agent.TempDirectory)\latest.xml.gz'
    azureSubscription: '$(AzureSubscription)'
    Destination: 'AzureBlob'
    storage: '$(AzureStorageAccount)'
    ContainerName: '$(AzureStorageBlob)'



- task: PythonScript@0
  displayName: 'Start Data Import Pipeline'
  inputs:
    scriptSource: 'inline'
    script: |
      """Send a request to the Data Import Pipeline in order to trigger it"""
      import urllib.request

      hdr = {'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.11 (KHTML, like Gecko) Chrome/23.0.1271.64 Safari/537.11',
      'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
      'Accept-Charset': 'ISO-8859-1,utf-8;q=0.7,*;q=0.3',
      'Accept-Encoding': 'none',
      'Accept-Language': 'en-US,en;q=0.8',
      'Connection': 'keep-alive'}

      url = '$(DataPipelineURL)'

      print('Sending request to pipeline...')

      pipeline_request = urllib.request.Request(url, headers=hdr)
      pipeline_response = urllib.request.urlopen(pipeline_request, timeout=120)

      print('Request sent!')
